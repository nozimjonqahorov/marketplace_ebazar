{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center text-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-4 p-4 border-top border-danger border-4">
                <i class="fa-solid fa-circle-exclamation text-danger fa-4x mb-3"></i>
                <h3 class="fw-bold">Ishonchingiz komilmi?</h3>
                <p class="text-muted">Siz <strong>"{{ Card.name }}"</strong> kartasini o'chirmoqchisiz. Bu amalni qaytarib bo'lmaydi!</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-danger rounded-pill py-2 fw-bold">Ha, o'chirilmasin</button>
                        <a href="{% url 'card-detail' Card.pk %}" class="btn btn-light rounded-pill py-2">Yo'q, qaytish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
